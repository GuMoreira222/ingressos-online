global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'auth'
    metrics_path: '/metrics'
    dns_sd_configs:
      - names: ['auth']
        type: 'A'
        port: 8000

  - job_name: 'events'
    metrics_path: '/metrics'
    dns_sd_configs:
      - names: ['events']
        type: 'A'
        port: 8001

  - job_name: 'orders'
    metrics_path: '/metrics'
    dns_sd_configs:
      - names: ['orders']
        type: 'A'
        port: 8002

  - job_name: 'payments'
    metrics_path: '/metrics'
    dns_sd_configs:
      - names: ['payments']
        type: 'A'
        port: 8003

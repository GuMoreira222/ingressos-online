services:
  postgres:
    image: postgres:15
    container_name: ingressos_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: ingressos_redis
    ports:
      - "6379:6379"

  auth:
    build:
      context: ./auth
    container_name: ingressos_auth
    ports:
      - "8000:8000"
    env_file:
      - ./auth/.env
    depends_on:
      postgres:
        condition: service_healthy

  events:
    build:
      context: ./events
    container_name: ingressos_events
    ports:
      - "8001:8001"
    env_file:
      - ./events/.env
    depends_on:
      postgres:
        condition: service_healthy

  orders:
    build:
      context: ./orders
    container_name: ingressos_orders
    ports:
      - "8002:8002"
    env_file:
      - ./orders/.env
    depends_on:
      postgres:
        condition: service_healthy
      events:
        condition: service_started
      payments:
        condition: service_started

  payments:
    build:
      context: ./payments
    container_name: ingressos_payments
    ports:
      - "8003:8003"
    env_file:
      - ./payments/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres_data:

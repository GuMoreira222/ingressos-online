events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;
    error_log   /var/log/nginx/error.log   warn;

    sendfile        on;
    keepalive_timeout  65;

    # DNS resolver for Docker containers (127.0.0.11 is the Docker internal DNS server)
    resolver 127.0.0.11 valid=5s;

    # Load Balancer Upstreams
    upstream auth_servers {
        server auth:8000;
    }

    upstream events_servers {
        server events:8001;
    }

    upstream orders_servers {
        server orders:8002;
    }

    upstream payments_servers {
        server payments:8003;
    }

    server {
        listen 80;

        # API Gateway Routes
        # Health checks routed directly to root /health of services
        location = /auth/health {
            proxy_pass http://auth_servers/health;
        }

        location = /events/health {
            proxy_pass http://events_servers/health;
        }

        location = /orders/health {
            proxy_pass http://orders_servers/health;
        }

        location = /payments/health {
            proxy_pass http://payments_servers/health;
        }

        location /auth {
            proxy_pass http://auth_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Increase timeouts for long-running calls
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        location /events {
            proxy_pass http://events_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        location /orders {
            proxy_pass http://orders_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        location /payments {
            proxy_pass http://payments_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        # Healthcheck endpoint for Gateway
        location /health {
            default_type application/json;
            return 200 '{"status":"ok","gateway":"nginx"}';
        }
    }
}
